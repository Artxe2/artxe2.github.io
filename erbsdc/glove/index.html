    <script type="text/javascript" src='../db/weapon/RapierDB.js?2021-05-19-19:21'></script>
    <script type="text/javascript" src='../db/weapon/ShurikenDB.js?2021-05-19-19:21'></script>
    <script type="text/javascript" src='../db/weapon/SniperRifleDB.js?2021-05-19-19:21'></script>

    <script type="text/javascript" src='../db/weapon/TonfaDB.js?2021-05-19-19:21'></script>
    <script type="text/javascript" src='../db/weapon/TwoHandedSwordDB.js?2021-05-19-19:21'></script>
    <script type="text/javascript" src='../db/weapon/WhipDB.js?2021-05-19-19:21'></script>
    <script type="text/javascript">

        const IMG_PATH = 'https://cdn.jsdelivr.net/gh/artxe2/Artxe2.github.io/erbsdc/img/';

        checkHr = i =>
                i.Name === 'Rocker`s_Jacket' ||
                i.Name === 'Sword_Stopper' ||
                i.Name === 'White_Rhinos' ||
                i.Name === 'White_Crane_Fan' ||
                i.Name === 'Gilded_Quill_Fan'

        const level = 15;

        calcSpec = i => round(
            (i.Attack_Power ?
                round(i.Attack_Power * 0.65, 2) : 0) +
            (i.Attack_Power_per_level ?
                round(i.Attack_Power_per_level * 0.65 * level, 2) : 0) +
            (i.Defense ?
                round(i.Defense * 0.45, 2) : 0) +
            (i.Defense_per_level ?
                round(i.Defense_per_level * 0.45 * level, 2) : 0) +
            (i.Max_HP ?
                round(i.Max_HP * 0.045, 2) : 0) +
            (i.Max_HP_per_level ?
                round(i.Max_HP_per_level * 0.04 * level, 2) : 0) +
            // (i.Max_SP ?
            //     round(i.Max_SP * 0.0, 2) : 0) +
            (i.HP_Regen ?
                round(i.HP_Regen * 0.25, 2) : 0) +
            (i.HP_Regen_Percent ?
                round(i.HP_Regen_Percent * 0.005, 2) : 0) +
            // (i.SP_Regen ?
            //     round(i.SP_Regen * 0.0, 2) : 0) +
            // (i.SP_Regen_Percent ?
            //     round(i.MSP_Regen_Percentax_SP * 0.0, 2) : 0) +
            (i.Attack_Speed ?
                round(i.Attack_Speed * 0.3, 2) : 0) +
            (i.Attack_Speed_per_level ?
                round(i.Attack_Speed_per_level * 0.3 * level, 2) : 0) +
            (i.Movement_Speed ?
                round(i.Movement_Speed * 25, 2) : 0) +
            (i.Movement_speed_while_not_in_combat ?
                round(i.Movement_speed_while_not_in_combat * 10, 2) : 0) +
            (i.Vision_Range ?
                round(i.Vision_Range, 2) : 0) +
            (i.Critical_Strike_Chance ?
                round(i.Critical_Strike_Chance * 0.5, 2) : 0) +
            (i.Critical_Damage ?
                round(i.Critical_Damage * 0.25, 2) : 0) +
            (i.Critical_Damage_Reduction ?
                round(i.Critical_Damage_Reduction * 0.2, 2) : 0) +
            (i.Cooldown_Reduction ?
                round(i.Cooldown_Reduction * 1, 2) : 0) +
            (i.Life_Steal ?
                round(i.Life_Steal * 0.45, 2) : 0) +
            (i.Attack_Range ?
                round(i.Attack_Range * 10, 2) : 0) +
            (i.Extra_Normal_Attack_Damage ?
                round(i.Extra_Normal_Attack_Damage * 0.65, 2) : 0) +
            (i.Extra_Normal_Attack_Damage_per_level ?
                round(i.Extra_Normal_Attack_Damage_per_level * 0.65 * level, 2) : 0) +
            (i.Extra_Normal_Attack_Damage_Percent ?
                round(i.Extra_Normal_Attack_Damage_Percent * 0.7, 2) : 0) +
            (i.Normal_Attack_Damage_Reduction ?
                round(i.Normal_Attack_Damage_Reduction * 0.5, 2) : 0) +
            (i.Skill_Amplification ?
                round(i.Skill_Amplification * 0.6, 2) : 0) +
            (i.Skill_Amplification_per_level ?
                round(i.Skill_Amplification_per_level * 0.6 * level, 2) : 0) +
            (i.Skill_Amplification_Percent ?
                round(i.Skill_Amplification_Percent * 0.7, 2) : 0) +
            (i.Skill_Amplification_Percent_per_level ?
                round(i.Skill_Amplification_Percent_per_level * 0.7 * level, 2) : 0) +
            (i.Skill_Damage_Reduction ?
                round(i.Skill_Damage_Reduction * 0.45, 2) : 0) +
            (i.Skill_Damage_Reduction_Percent ?
                round(i.Skill_Damage_Reduction_Percent * 0.55, 2) : 0) +
            (checkHr(i) ? 0 : 0), 2);

        round = (n, d) => {
            const corr = n < 0 ? -0.0001 : 0.0001;
            if (d) {
                for (let i = 0; i < d; i++) {
                    n *= 10;
                }
                if (n % 1 + corr >= 0.5) {
                    n = (n + corr | 0) + 1;
                } else {
                    n = n + corr | 0;
                }
                let v = 1;
                for (let i = 0; i < d; i++) {
                    v *= 10;
                }
                return n / v;
            }
            if (n % 1 + corr >= 0.5) {
                return (n + corr | 0) + 1;
            }
            return n + corr | 0;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const table = document.querySelector('#table');
            const items = [];
            const equips = [[],[],[],[],[],[]];
            let count = 0;

            for (i of Accessory) {
                if (i.Rarity === 'Rare' || i.Rarity === 'Epic' || i.Rarity === 'Legendary') {
                    items.push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                    equips[5].push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                }
            }
            for (i of Leg) {
                if (i.Rarity === 'Rare' || i.Rarity === 'Epic' || i.Rarity === 'Legendary') {
                    items.push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                    equips[4].push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                }
            }
            for (i of Arm) {
                if (i.Rarity === 'Rare' || i.Rarity === 'Epic' || i.Rarity === 'Legendary') {
                    items.push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                    equips[3].push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                }
            }
            for (i of Head) {
                if (i.Rarity === 'Rare' || i.Rarity === 'Epic' || i.Rarity === 'Legendary') {
                    items.push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                    equips[2].push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                }
            }
            for (i of Chest) {
                if (i.Rarity === 'Rare' || i.Rarity === 'Epic' || i.Rarity === 'Legendary') {
                    items.push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                    equips[1].push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "armors/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                }
            }
            for (i of Glove) {
                if (i.Name === 'Cotton_Gloves' || i.Rarity === 'Rare' || i.Rarity === 'Epic' || i.Rarity === 'Legendary') {
                    items.push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "weapon/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                    equips[0].push([
                        "<img class='" + i.Rarity + "' title='" + i.Title + "' src = '" + IMG_PATH + "weapon/" + i.Name + ".png' width='65px' height='35px' border='1'>"
                        , calcSpec(i), count++]);
                }
            }

            const compare = (a, b) => (a[1] < b[1]) - (b[1] < a[1]) || (a[2] < b[2]) - (b[2] < a[2]);

            items.sort(compare);
            for (e of equips) {
                e.sort(compare);
            }

            let br = 0;
            let list = '';
            for (item of equips) {
                br = 0;
                for (i of item) {
                    list += i[0];
                    list += "<div style='width:100px'><b> " + i[1] + '</b></div>';
                    if (++br === 6) {
                        br = 0;
                        list += '<br/>';
                    }
                }
                if (br > 0) {
                    list += '<br/>';
                }
                list += '<br/>';
            }
            table.innerHTML = list;
        });
    </script>
</head>
<body>
    <div id='table'></div>
