<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>점진적 누적 확률 모형 GAPM(Gradual Accumulated Probability Model)</title>
		<script src="https://artxe2.github.io/css-lube/css-lube.min.js"></script>
		<script src="https://d3js.org/d3.v6.min.js"></script>
	</head>
	<body>
		<main class="p=0_2">
			<!-- draw_general_graph -> -->
			<h1 class="ta=center fs=3 bold">점진적 누적 확률 모형 GAPM<br>(Gradual Accumulated Probability Model)</h1>
			<div class="h=4"></div>
			<h2 class="ta=center fs=2 bold">일반적인 확률 모형의 시도 횟수에 따른 당첨 확률 양상</h2>
			<div class="h=1"></div>
			<div class="flex jc=center">
				<div class="w=min(100%,800px) h=0 pb=min(56.25%,450px) bd=1px_solid_#000">
					<div id="general-graph"></div>
				</div>
				<script>
					function draw_general_graph(percentage) {
						const ceiling = (3 / percentage)|0
						const data = [{ probability_of_success: 0, dice_rolls: 0 }]
						const fail_percentage = 1 - percentage
						let line_25
						let line_75
						let acc = 0
						let left = 1
						for (let i = 1; i <= ceiling; i++) {
							acc += left * percentage
							left *= fail_percentage
							data[i] = {
								dice_rolls: i,
								probability_of_success: acc
							}
							if (!line_25 && acc >= .25) {
								line_25 = i
							} else if (!line_75 && acc >= .75) {
								line_75 = i
							}
						}
						const width = 800
						const height = 450
						const padding = 40
						const svg = d3.select("#general-graph")
							.append("svg")
							.attr("viewBox", "0 0 800 450")
						const x_scale = d3.scaleLinear()
							.domain([0, data.at(-1).dice_rolls])
							.range([padding, width - padding])
						const y_scale = d3.scaleLinear()
							.domain([0, 1])
							.range([height - padding, padding])
						const line = d3.line()
							.x(d => x_scale(d.dice_rolls))
							.y(d => y_scale(d.probability_of_success))
						svg.append("path")
							.datum(data)
							.attr("fill", "none")
							.attr("stroke", "steelblue")
							.attr("stroke-width", 4)
							.attr("d", line)
						svg.append("g")
							.attr("transform", `translate(0, ${height - padding})`)
							.call(d3.axisBottom(x_scale))
						svg.append("g")
							.attr("transform", `translate(${padding}, 0)`)
							.call(d3.axisLeft(y_scale))
						svg.append("text")
							.attr("x", width)
							.attr(
								"y",
								padding / 2
								+ (1 - data.at(-1).probability_of_success)
								* (height - padding * 2)
							)
							.attr("text-anchor", "end")
							.attr("alignment-baseline", "middle")
							.style("font-size", "24px")
							.text(
								(data.at(-1).probability_of_success * 100).toFixed(2) + "%"
							)
						svg.append("rect")
							.attr(
								"x",
								padding
								+ (width - padding * 2) / ceiling * line_25
							)
							.attr("y", padding)
							.attr(
								"width",
								(width - padding * 2) / ceiling * (line_75 - line_25)
							)
							.attr("height", height - padding * 2)
							.attr("fill", "rgba(0, 255, 0, 0.2)")
					}
					draw_general_graph(.01)
				</script>
			</div>
			<!-- <- draw_general_graph -->
			<div class="h=4"></div>
			<!-- draw_ceiling_graph -> -->
			<h2 class="ta=center fs=2 bold">천장 시스템을 도입한 확률 모형의 시도 횟수에 따른 당첨 확률 양상</h2>
			<div class="h=1"></div>
			<div class="flex jc=center">
				<div class="w=min(100%,800px) h=0 pb=min(56.25%,450px) bd=1px_solid_#000">
					<div id="ceiling-graph"></div>
				</div>
				<script>
					function draw_ceiling_graph(percentage) {
						const ceiling = (1.5 / percentage)|0
						const data = [{ probability_of_success: 0, dice_rolls: 0 }]
						const fail_percentage = 1 - percentage
						let line_25
						let line_75
						let acc = 0
						let left = 1
						for (let i = 1; i <= ceiling; i++) {
							acc += left * percentage
							left *= fail_percentage
							data[i] = {
								dice_rolls: i,
								probability_of_success: acc
							}
							if (!line_25 && acc >= .25) {
								line_25 = i
							} else if (!line_75 && acc >= .75) {
								line_75 = i
							}
						}
						const width = 800
						const height = 450
						const padding = 40
						const svg = d3.select("#ceiling-graph")
							.append("svg")
							.attr("viewBox", "0 0 800 450")
						const x_scale = d3.scaleLinear()
							.domain([0, data.at(-1).dice_rolls])
							.range([padding, width - padding])
						const y_scale = d3.scaleLinear()
							.domain([0, 1])
							.range([height - padding, padding])
						const line = d3.line()
							.x(d => x_scale(d.dice_rolls))
							.y(d => y_scale(d.probability_of_success))
						svg.append("path")
							.datum(data)
							.attr("fill", "none")
							.attr("stroke", "steelblue")
							.attr("stroke-width", 4)
							.attr("d", line)
						svg.append("g")
							.attr("transform", `translate(0, ${height - padding})`)
							.call(d3.axisBottom(x_scale))
						svg.append("g")
							.attr("transform", `translate(${padding}, 0)`)
							.call(d3.axisLeft(y_scale))
						svg.append("text")
							.attr("x", width)
							.attr(
								"y",
								padding / 2
								+ (1 - data.at(-1).probability_of_success)
								* (height - padding * 2)
							)
							.attr("text-anchor", "end")
							.attr("alignment-baseline", "middle")
							.style("font-size", "24px")
							.text(
								(data.at(-1).probability_of_success * 100).toFixed(2) + "%"
							)
						svg.append("rect")
							.attr(
								"x",
								padding
								+ (width - padding * 2) / ceiling * line_25
							)
							.attr("y", padding)
							.attr(
								"width",
								(width - padding * 2) / ceiling * (line_75 - line_25)
							)
							.attr("height", height - padding * 2)
							.attr("fill", "rgba(0, 255, 0, 0.2)")
					}
					draw_ceiling_graph(.005)
				</script>
			</div>
			<!-- <- draw_ceiling_graph -->
			<div class="h=4"></div>
			<!-- draw_general_graph -> -->
			<h2 class="ta=center fs=2 bold">GAPM의 시도 횟수에 따른 당첨 확률 양상</h2>
			<div class="h=1"></div>
			<div class="flex jc=center">
				<div class="w=min(100%,800px) h=0 pb=min(56.25%,450px) bd=1px_solid_#000">
					<div id="gapm-graph"></div>
				</div>
				<script>
					function probability_table(percentage) {
						const ceiling = (2 / percentage)|0
						let low = 1
						let high = 1.4
						for(;;) {
							const multiply = (low + high) / 2
							const init = 1 / Math.pow(multiply, ceiling - 1)
							let roles_count = 1
							let left = 1
							for (let i = 1; i <= ceiling; i++) {
								left *= 1 - init * multiply ** i
								roles_count += left
							}
							if (1 / roles_count >= percentage) {
								if (high - low <= 1e-15) {
									return {
										percentage: 1 / roles_count
										, init
										, multiply
										, ceiling
									}
								}
								low = multiply
							} else {
								high = multiply
							}
						}
					}
					function draw_general_graph(percentage) {
						const { init, multiply } = probability_table(percentage)
						const ceiling = (2 / percentage)|0
						const data = [{ probability_of_success: 0, dice_rolls: 0 }]
						let line_25
						let line_75
						let acc = 0
						let left = 1
						percentage = init
						for (let i = 1; i <= ceiling; i++) {
							acc += left * percentage
							left *= 1 - percentage
							data[i] = {
								dice_rolls: i,
								probability_of_success: acc
							}
							percentage = init * multiply ** i
							if (!line_25 && acc >= .25) {
								line_25 = i
							} else if (!line_75 && acc >= .75) {
								line_75 = i
							}
						}
						const width = 800
						const height = 450
						const padding = 40
						const svg = d3.select("#gapm-graph")
							.append("svg")
							.attr("viewBox", "0 0 800 450")
						const x_scale = d3.scaleLinear()
							.domain([0, data.at(-1).dice_rolls])
							.range([padding, width - padding])
						const y_scale = d3.scaleLinear()
							.domain([0, 1])
							.range([height - padding, padding])
						const line = d3.line()
							.x(d => x_scale(d.dice_rolls))
							.y(d => y_scale(d.probability_of_success))
						svg.append("path")
							.datum(data)
							.attr("fill", "none")
							.attr("stroke", "steelblue")
							.attr("stroke-width", 4)
							.attr("d", line)
						svg.append("g")
							.attr("transform", `translate(0, ${height - padding})`)
							.call(d3.axisBottom(x_scale))
						svg.append("g")
							.attr("transform", `translate(${padding}, 0)`)
							.call(d3.axisLeft(y_scale))
						svg.append("text")
							.attr("x", width)
							.attr(
								"y",
								padding / 2
								+ (1 - data.at(-1).probability_of_success)
								* (height - padding * 2)
							)
							.attr("text-anchor", "end")
							.attr("alignment-baseline", "middle")
							.style("font-size", "24px")
							.text(
								(data.at(-1).probability_of_success * 100).toFixed(2) + "%"
							)
						svg.append("rect")
							.attr(
								"x",
								padding
								+ (width - padding * 2) / ceiling * line_25
							)
							.attr("y", padding)
							.attr(
								"width",
								(width - padding * 2) / ceiling * (line_75 - line_25)
							)
							.attr("height", height - padding * 2)
							.attr("fill", "rgba(0, 255, 0, 0.2)")
					}
					draw_general_graph(.01)
				</script>
			</div>
			<!-- <- draw_general_graph -->
			<div>
				<script>
					var a = probability_table(.01)
					var b = probability_table(.02)
					console.log(a, b)
				</script>
			</div>
		</main>
	</body>
</html>
